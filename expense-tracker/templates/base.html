<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendWise — Personal Finance Dashboard</title>
  <meta name="description" content="Track your personal expenses, view monthly summaries, and filter by category, date, and title." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- Top Navigation -->
  <header class="app-header" id="app-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon">
          <i class="bi bi-wallet2"></i>
        </div>
        <div>
          <h1 class="brand-name">SpendWise</h1>
          <p class="brand-tagline">Personal Finance Dashboard</p>
        </div>
      </div>
      <div class="header-right">
        <button class="btn-theme-toggle" id="theme-toggle-btn" aria-label="Toggle theme" title="Toggle theme">
          <i class="bi bi-sun" id="theme-toggle-icon"></i>
        </button>
        <div class="header-stat" id="header-total">
          <span class="header-stat-label">This Month</span>
          <span class="header-stat-value">₹0.00</span>
        </div>
      </div>
    </div>
  </header>

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
